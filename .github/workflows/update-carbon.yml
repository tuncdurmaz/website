name: Update Dashboard Data

on:
  schedule:
    # Hourly Mon-Fri for carbon prices (markets); the climate datasets
    # only refresh once a day at 04:00 UTC since NOAA/NASA/NSIDC publish monthly.
    - cron: '0 * * * 1-5'
    - cron: '0 4 * * *'
  workflow_dispatch: # Run manually from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Update carbon prices (ETS markets)
        run: python update_prices.py

      - name: Update climate data (CO2, CH4, N2O, temp, sea ice)
        run: python update_climate.py
        continue-on-error: true  # don't fail the workflow if NOAA is briefly down

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add carbon_prices.json climate_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update dashboard data" && git push)
